<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #51cbce;
            --color-success: #6bd098;
            --color-info: #51bcda;
            --color-warning: #fbc658;
            --color-danger: #ef8157;
            --color-body-bg: #f4f3ef;
            --color-surface: #ffffff;
            --color-font: #66615b;
            --color-muted: #a49e93;
            --color-black: #2c2c2c;
            --color-gray-light: #e3e3e3;
            --font-family: 'Montserrat', 'Helvetica Neue', Arial, sans-serif;
            --font-size-base: 14px;
            --font-size-sm: 12px;
            --font-size-xs: 10px;
            --font-size-number: 28px;
            --font-weight-normal: 400;
            --font-weight-semi: 600;
            --font-weight-bold: 700;
            --spacing-sm: 10px;
            --spacing-base: 15px;
            --spacing-lg: 30px;
            --radius-card: 12px;
            --shadow-card: 0px 6px 10px -4px rgba(0, 0, 0, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family, 'Montserrat', sans-serif);
            background-color: var(--color-body-bg, #f4f3ef);
            color: var(--color-font, #66615b);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: var(--spacing-lg, 30px);
        }

        .card {
            background-color: var(--color-surface, #ffffff);
            border-radius: var(--radius-card, 12px);
            box-shadow: var(--shadow-card, 0px 6px 10px -4px rgba(0, 0, 0, 0.15));
            padding: var(--spacing-lg, 30px);
            width: 100%;
            max-width: 420px;
        }

        .card-title {
            font-size: var(--font-size-base, 14px);
            font-weight: var(--font-weight-semi, 600);
            color: var(--color-muted, #a49e93);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: var(--spacing-sm, 10px);
        }

        .card-value {
            font-size: var(--font-size-number, 28px);
            font-weight: var(--font-weight-bold, 700);
            color: var(--color-black, #2c2c2c);
            margin-bottom: 6px;
        }

        .card-trend {
            font-size: var(--font-size-sm, 12px);
            font-weight: var(--font-weight-semi, 600);
            color: var(--color-success, #6bd098);
            margin-bottom: var(--spacing-lg, 30px);
        }

        .chart {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding-top: var(--spacing-base, 15px);
            border-top: 1px solid var(--color-gray-light, #e3e3e3);
        }

        .chart-bar-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .chart-bar-track {
            width: 100%;
            height: 90px;
            display: flex;
            align-items: flex-end;
        }

        .chart-bar {
            width: 100%;
            border-radius: 4px 4px 0 0;
            background-color: var(--color-primary, #51cbce);
            transition: opacity 0.2s;
        }

        .chart-bar:hover { opacity: 0.8; }

        .chart-bar.current {
            background-color: var(--color-primary, #51cbce);
        }

        .chart-label {
            font-size: var(--font-size-xs, 10px);
            color: var(--color-muted, #a49e93);
            font-weight: var(--font-weight-semi, 600);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-title">Monthly Energy Usage</div>
        <div class="card-value">2,847 kWh</div>
        <div class="card-trend">&#9650; +12% from last month</div>
        <div class="chart">
            <div class="chart-bar-group">
                <div class="chart-bar-track"><div class="chart-bar" style="height: 45%;"></div></div>
                <span class="chart-label">Oct</span>
            </div>
            <div class="chart-bar-group">
                <div class="chart-bar-track"><div class="chart-bar" style="height: 62%;"></div></div>
                <span class="chart-label">Nov</span>
            </div>
            <div class="chart-bar-group">
                <div class="chart-bar-track"><div class="chart-bar" style="height: 50%;"></div></div>
                <span class="chart-label">Dec</span>
            </div>
            <div class="chart-bar-group">
                <div class="chart-bar-track"><div class="chart-bar" style="height: 75%;"></div></div>
                <span class="chart-label">Jan</span>
            </div>
            <div class="chart-bar-group">
                <div class="chart-bar-track"><div class="chart-bar" style="height: 68%;"></div></div>
                <span class="chart-label">Feb</span>
            </div>
            <div class="chart-bar-group">
                <div class="chart-bar-track"><div class="chart-bar current" style="height: 85%;"></div></div>
                <span class="chart-label">Mar</span>
            </div>
        </div>
    </div>
</body>
</html>
