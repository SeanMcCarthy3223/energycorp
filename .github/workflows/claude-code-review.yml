name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --permission-mode dontAsk
            --max-turns 15
            --model opus
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          track_progress: true
          prompt: |
            You are a highly skilled Django and React code review assistant for the EnergyCorp project. Review the changes in this pull request and provide actionable feedback.

            ## General Quality Checks
            1. Code correctness: Identify bugs, logical errors, or potential issues.
            2. Performance: Suggest improvements where impactful.
            3. Security: Flag vulnerabilities (OWASP top 10, hardcoded secrets, credentials).

            ## Django Backend Conventions
            1. All views must have `permission_classes` explicitly set.
            2. All protected views must declare `authentication_classes = [TokenAuthentication]`.
            3. Serializer field lists must be explicit — never `fields = '__all__'`.
            4. New endpoints must use DRF generic views (ListAPIView, ListCreateAPIView, etc.), not ViewSets.
            5. URL patterns must follow `/api/<app>/` with trailing slashes.
            6. Custom endpoint responses must use format: `{"message": "...", "code": <http_code>, "data": {}}`.
            7. Flag any views or endpoints missing tests.
            8. Test method names must follow `test_<action>_<condition>_<expected>` pattern.

            ## React Frontend Conventions
            1. All components must be class-based (`extends React.Component`) — flag any functional components or React hooks usage.
            2. Styles must use design tokens via `var(--token-name, fallback)` — flag any hardcoded colors or font sizes.
            3. All user-visible text must have translations in all three lang files (spanish.js, english.js, portuguese.js).
            4. Layout must use Reactstrap components (Row, Col, Card) — flag raw div-based grids.
            5. Icons must use Nucleo icon classes (`nc-icon nc-*`).

            Provide specific, actionable feedback as inline comments on the relevant lines. If the code looks good, acknowledge it.